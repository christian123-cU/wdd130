<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact White Water Rafting Co. for bookings, inquiries, and adventure planning. Reach out to our team today.">

    <meta name="author" content="David Oduor">

    <title>Contact Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.jpg" alt="Rafting Company Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- PAGE INTRO -->
        <section class="contact-intro">
            <h1>White Water Rafting Company</h1>
            <p> 622 River Adventure Lane, Nairobi</p>
            <p> +254 795 063 917</p>
            <p> info@raftingcompany.com</p>
        </section>

        <!-- CONTACT LAYOUT -->
        <section class="contact-layout">

            <!-- LEFT: MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Nairobi+National+Park&output=embed"
                  loading="lazy"></iframe>
            </div>

            <!-- RIGHT: INFO + FORM -->
            <div class="right-side">

                <!-- FORM -->
                <div class="contact-form">

                    <form>

                        <label for="name">Your Name:</label>
                        <input type="text" id="name" name="name" required>

                        <label for="email">Your Email:</label>
                        <input type="email" id="email" name="email" required>

                        <fieldset>
                            <legend>Purpose of Your Message:</legend>

                            <label>
                                <input type="radio" name="purpose" value="General Inquiry" required>
                                General Inquiry
                            </label>

                            <label>
                                <input type="radio" name="purpose" value="Reservation Question">
                                Reservation Question
                            </label>

                            <label>
                                <input type="radio" name="purpose" value="Website Suggestion">
                                Website Suggestion
                            </label>
                        </fieldset>

                        <label for="message">Your Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>

                        <label>
                            <input type="checkbox" name="subscribe">
                            Please subscribe me to the monthly newsletter
                        </label>

                        <button type="submit">Send Your Message</button>

                    </form>
                </div>

            </div>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We are Here to Serve You</h2>

            <figure>
                <img src="images/operationm.jpg" alt="Operations Manager">
                <figcaption>Paul Mwangi – Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/tourguide.jpeg" alt="Lead River Guide">
                <figcaption>David Kimani – Lead River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/customer experience.jpeg" alt="Customer Experience Officer">
                <figcaption>Faith Achieng – Customer Experience Officer</figcaption>
            </figure>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 White Water Rafting Co. | David Oduor</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
